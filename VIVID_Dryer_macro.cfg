###########################
#     VVD Filament dry    #
#   Dynamic presets (4)   #
###########################

# REQUIRED: persistent storage across restarts
# Create folder/file path if needed; Klipper will create the file on first SAVE_VARIABLE.
[save_variables]
filename: ~/printer_data/config/vivid_dryer_vars.cfg

[respond]

# ============================================================
# UI: Popup with 4 preset buttons (reads from save_variables)
# ============================================================
[gcode_macro VIVID_DRYER]
description: Popup: 4 presets (dynamic via SAVE_VARIABLE) + Cancel
gcode:
  {% set sv = printer.save_variables.variables %}

  {% set n1 = sv.get('vvd_p1_name',  'Preset 1') %}
  {% set t1 = sv.get('vvd_p1_temp',  40.0)|float %}
  {% set h1 = sv.get('vvd_p1_hours', 4.0)|float %}

  {% set n2 = sv.get('vvd_p2_name',  'Preset 2') %}
  {% set t2 = sv.get('vvd_p2_temp',  45.0)|float %}
  {% set h2 = sv.get('vvd_p2_hours', 6.0)|float %}

  {% set n3 = sv.get('vvd_p3_name',  'Preset 3') %}
  {% set t3 = sv.get('vvd_p3_temp',  50.0)|float %}
  {% set h3 = sv.get('vvd_p3_hours', 8.0)|float %}

  {% set n4 = sv.get('vvd_p4_name',  'Preset 4') %}
  {% set t4 = sv.get('vvd_p4_temp',  55.0)|float %}
  {% set h4 = sv.get('vvd_p4_hours', 2.0)|float %}

  {% set b1 = "action:prompt_button %s (%.0fC / %sh)|VIVID_DRYER_START_SLOT SLOT=1|primary" % (n1, t1, h1) %}
  {% set b2 = "action:prompt_button %s (%.0fC / %sh)|VIVID_DRYER_START_SLOT SLOT=2|primary" % (n2, t2, h2) %}
  {% set b3 = "action:prompt_button %s (%.0fC / %sh)|VIVID_DRYER_START_SLOT SLOT=3|primary" % (n3, t3, h3) %}
  {% set b4 = "action:prompt_button %s (%.0fC / %sh)|VIVID_DRYER_START_SLOT SLOT=4|primary" % (n4, t4, h4) %}

  RESPOND TYPE=command MSG="action:prompt_end"
  RESPOND TYPE=command MSG="action:prompt_begin Vivid Dryer"
  RESPOND TYPE=command MSG="action:prompt_text Choose a preset."
  RESPOND TYPE=command MSG="action:prompt_button_group_start"
  RESPOND TYPE=command MSG="{b1}"
  RESPOND TYPE=command MSG="{b2}"
  RESPOND TYPE=command MSG="{b3}"
  RESPOND TYPE=command MSG="{b4}"
  RESPOND TYPE=command MSG="action:prompt_button_group_end"
  RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|VIVID_DRYER_CANCEL|error"
  RESPOND TYPE=command MSG="action:prompt_show"


# ============================================================
# Start from SLOT (reads the saved preset values)
# ============================================================
[gcode_macro VIVID_DRYER_START_SLOT]
description: Internal: start dryer using preset SLOT=1..4 stored in save_variables
gcode:
  {% set slot = params.SLOT|int %}
  {% if slot < 1 or slot > 4 %}
    {action_raise_error("SLOT must be 1..4")}
  {% endif %}

  {% set sv = printer.save_variables.variables %}

  {% set name = sv.get('vvd_p%d_name'  % slot, 'Preset %d' % slot) %}
  {% set temp = sv.get('vvd_p%d_temp'  % slot, 40.0)|float %}
  {% set hours = sv.get('vvd_p%d_hours' % slot, 4.0)|float %}

  VIVID_DRYER_START PRESET="{name}" TEMP={temp} HOURS={hours}


# ============================================================
# Save/Update a preset dynamically (persistent)
#
# Run from UI with params:
#   VIVID_DRYER_SAVE_PRESET SLOT=1 NAME="PLA Gentle" TEMP=40 HOURS=4
# ============================================================
[gcode_macro VIVID_DRYER_SAVE_PRESET]
description: Persistently set a preset SLOT=1..4 NAME="..." TEMP=.. HOURS=..
gcode:
  {% set slot = params.SLOT|int %}
  {% if slot < 1 or slot > 4 %}
    {action_raise_error("SLOT must be 1..4")}
  {% endif %}

  {% set name = params.NAME|default("Preset %d" % slot) %}
  {% set temp = params.TEMP|float %}
  {% set hours = params.HOURS|float %}

  {% set max_temp = printer["gcode_macro VIVID_DRYER_START"].max_temp|float %}

  {% if hours < 0 %}
    {action_raise_error("HOURS must be >= 0")}
  {% endif %}
  {% if temp < 0 %}
    {action_raise_error("TEMP must be >= 0")}
  {% endif %}
  {% if temp > max_temp %}
    {action_raise_error("TEMP must be <= %.0f" % max_temp)}
  {% endif %}

  # Persist across restarts
  SAVE_VARIABLE VARIABLE={"vvd_p%d_name" % slot} VALUE='"{name}"'
  SAVE_VARIABLE VARIABLE={"vvd_p%d_temp" % slot} VALUE={temp}
  SAVE_VARIABLE VARIABLE={"vvd_p%d_hours" % slot} VALUE={hours}

  RESPOND MSG="Saved preset {slot}: {name} ({temp}C / {hours}h)."
  # Optional: reopen popup to reflect changes immediately
  VIVID_DRYER


# ============================================================
# Core run logic: Save/restore original IDLE_TIMEOUT
# ============================================================
[gcode_macro VIVID_DRYER_START]
description: Start dryer (TEMP C, HOURS hours). Restores prior IDLE_TIMEOUT after duration.
variable_prev_idle_timeout: 0
variable_active: 0
variable_last_preset: "Custom"
variable_max_temp: 60.0
gcode:
  RESPOND TYPE=command MSG="action:prompt_end"

  {% set temp = params.TEMP|default(40)|float %}
  {% set hours = params.HOURS|default(4)|float %}
  {% set preset = params.PRESET|default("Custom") %}

  {% set max_temp = printer["gcode_macro VIVID_DRYER_START"].max_temp|float %}

  {% if temp > max_temp %}
    {action_raise_error("TEMP %.1fC exceeds limit %.1fC" % (temp, max_temp))}
  {% endif %}

  {% if hours < 0 %}
    {action_raise_error("HOURS must be >= 0")}
  {% endif %}

  {% set seconds = (hours * 3600.0)|int %}
  {% if seconds < 1 %}
    {action_raise_error("Time must be at least 1 second")}
  {% endif %}

  # If already running, stop/restore first so we don't lose the original timeout
  {% if printer["gcode_macro VIVID_DRYER_START"].active|int == 1 %}
    UPDATE_DELAYED_GCODE ID=VIVID_DRYER_RESTORE DURATION=0
    _VIVID_DRYER_RESTORE_NOW
  {% endif %}

  # Save last preset label (string must be quoted)
  SET_GCODE_VARIABLE MACRO=VIVID_DRYER_START VARIABLE=last_preset VALUE='"{preset}"'

  # Save current configured idle_timeout so it can be restored later
  SET_GCODE_VARIABLE MACRO=VIVID_DRYER_START VARIABLE=prev_idle_timeout VALUE={printer.configfile.settings.idle_timeout.timeout|int}
  SET_GCODE_VARIABLE MACRO=VIVID_DRYER_START VARIABLE=active VALUE=1

  # Start dryer and set idle timeout to duration
  SET_HEATER_TEMPERATURE HEATER=Vivid_1_dryer TARGET={temp}
  SET_IDLE_TIMEOUT TIMEOUT={seconds}

  # Schedule restore when duration ends
  UPDATE_DELAYED_GCODE ID=VIVID_DRYER_RESTORE DURATION={seconds}

  RESPOND MSG="Vivid dryer started ({preset}): {temp}C for {hours}h ({seconds}s). Saved IDLE_TIMEOUT={printer.configfile.settings.idle_timeout.timeout|int}s."


[gcode_macro VIVID_DRYER_CANCEL]
description: Cancel dryer; restore idle_timeout; turn heater off.
gcode:
  RESPOND TYPE=command MSG="action:prompt_end"
  UPDATE_DELAYED_GCODE ID=VIVID_DRYER_RESTORE DURATION=0
  _VIVID_DRYER_RESTORE_NOW


[gcode_macro VIVID_DRYER_STATUS]
description: Show dryer state + current stored presets.
gcode:
  {% set r = printer["gcode_macro VIVID_DRYER_START"] %}
  {% set sv = printer.save_variables.variables %}

  {% set n1 = sv.get('vvd_p1_name',  'Preset 1') %}
  {% set t1 = sv.get('vvd_p1_temp',  40.0)|float %}
  {% set h1 = sv.get('vvd_p1_hours', 4.0)|float %}

  {% set n2 = sv.get('vvd_p2_name',  'Preset 2') %}
  {% set t2 = sv.get('vvd_p2_temp',  45.0)|float %}
  {% set h2 = sv.get('vvd_p2_hours', 6.0)|float %}

  {% set n3 = sv.get('vvd_p3_name',  'Preset 3') %}
  {% set t3 = sv.get('vvd_p3_temp',  50.0)|float %}
  {% set h3 = sv.get('vvd_p3_hours', 8.0)|float %}

  {% set n4 = sv.get('vvd_p4_name',  'Preset 4') %}
  {% set t4 = sv.get('vvd_p4_temp',  55.0)|float %}
  {% set h4 = sv.get('vvd_p4_hours', 2.0)|float %}

  RESPOND MSG="Vivid dryer: active={r.active|int}, last_preset={r.last_preset}, prev_idle_timeout={r.prev_idle_timeout|int}s, current_idle_timeout={printer.configfile.settings.idle_timeout.timeout|int}s."
  RESPOND MSG="Presets: 1) {n1} {t1}C/{h1}h  2) {n2} {t2}C/{h2}h  3) {n3} {t3}C/{h3}h  4) {n4} {t4}C/{h4}h"


[gcode_macro _VIVID_DRYER_RESTORE_NOW]
description: Internal: restore idle_timeout and shut off dryer heater.
gcode:
  {% set r = printer["gcode_macro VIVID_DRYER_START"] %}
  {% if r.active|int == 1 %}
    SET_HEATER_TEMPERATURE HEATER=Vivid_1_dryer TARGET=0
    SET_IDLE_TIMEOUT TIMEOUT={r.prev_idle_timeout|int}
    SET_GCODE_VARIABLE MACRO=VIVID_DRYER_START VARIABLE=active VALUE=0
    RESPOND MSG="Vivid dryer finished/canceled. Restored IDLE_TIMEOUT to {r.prev_idle_timeout|int}s."
  {% else %}
    RESPOND MSG="Vivid dryer not active."
  {% endif %}


[delayed_gcode VIVID_DRYER_RESTORE]
initial_duration: 0
gcode:
  _VIVID_DRYER_RESTORE_NOW